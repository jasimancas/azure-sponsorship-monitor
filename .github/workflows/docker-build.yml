name: Build & Push Docker image

on:
  push:
    branches: [main]
    paths:
      - 'app.py'
      - 'templates/**'
      - 'requirements.txt'
      - 'Dockerfile'
      - '.github/workflows/docker-build.yml'
  workflow_dispatch:   # permite lanzarlo manualmente desde GitHub

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}   # ghcr.io/tu-usuario/azure-subscription-monitor

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # necesario para push a GHCR

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}   # automático, sin configurar nada

      - name: Extraer metadata (tags)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-          # sha-a1b2c3d
            type=raw,value=latest         # latest (siempre apunta al último build)

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build y push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            APP_VERSION=${{ github.sha }}
            BUILD_DATE=${{ github.event.head_commit.timestamp }}

      - name: Notificar a Azure App Service
        if: github.ref == 'refs/heads/main'
        run: |
          curl -s -X POST "${{ secrets.AZURE_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            --max-time 30
          echo "Azure notificado — desplegando nueva imagen"